<main class="register-shell">
  <div class="register-bg register-bg--grid" aria-hidden="true"></div>
  <div class="register-bg register-bg--overlay" aria-hidden="true"></div>

  <section class="register-wrap">
    <header class="hero-panel">
      <div class="hero-kicker">
        <span class="material-symbols-outlined">view_kanban</span>
        <span>CODEKAN // SYSTEM_SIGNUP</span>
      </div>

      <h1 class="hero-title"><span>&gt;</span> Crea tu cuenta en CodeKan.</h1>
      <p class="hero-copy">Comienza a gestionar tu tablero con sincronizacion GitHub.</p>
    </header>

    <section class="terminal-window" aria-label="Register form">
      <div class="terminal-header">
        <div class="terminal-dots" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <p>secure_shell_auth</p>
      </div>

      <div class="terminal-body">
        <form class="register-form" [formGroup]="form" (ngSubmit)="submit()" novalidate>
          <label for="email">
            <span>01.</span>
            Correo
          </label>
          <input id="email" type="email" formControlName="email" autocomplete="email" placeholder="USER@DOMAIN.COM" />

          <label for="password">
            <span>02.</span>
            Contraseña
          </label>
          <input id="password" type="password" formControlName="password" autocomplete="new-password" placeholder="********" />

          <button class="btn-angled btn-submit" type="submit">Registrarme</button>
        </form>

        <footer class="terminal-footer">
          <a routerLink="/auth/login">Ya tienes cuenta? Iniciar sesion</a>
        </footer>
      </div>
    </section>
  </section>

  <div class="status-row" aria-hidden="true">

    <div class="status-bars">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>
</main>
